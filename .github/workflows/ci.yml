name: CI

# Machine verification for every push / PR. The build container has the SDK/NDK
# and compiles everything, but has NO device or emulator — runtime behaviour
# (inference, image gen, overlay/OCR, performance) stays owner-verified. CI's job
# is to keep the JVM unit tests green and prove the project still compiles.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: # allow manual re-runs (e.g. after a transient registry 403)
  schedule:
    - cron: "17 6 * * 1" # weekly native-assemble canary (Mon 06:17 UTC)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Native llama.cpp / stable-diffusion.cpp sources for assembleFullDebug.
          submodules: recursive

      - name: Submodule pointers resolve to real content
        # §7 FIX — the check that would have caught a silent-unbuildable carve. Every
        # push: fail loudly if any submodule pointer is uninitialized/dangling, and assert
        # the includeBuild'd Hyle + the native sources actually landed. Cheap; runs before
        # the SDK setup so a bad pointer fails fast.
        run: |
          git submodule status --recursive || true
          if git submodule status --recursive | grep -qE '^-'; then
            echo "::error::a submodule pointer is uninitialized/dangling (see 'git submodule status')"; exit 1
          fi
          test -f hyle-design-system/settings.gradle.kts \
            || { echo "::error::hyle-design-system submodule is empty — includeBuild would fail"; exit 1; }
          test -f app/src/main/cpp/llama.cpp/CMakeLists.txt \
            || { echo "::error::llama.cpp submodule is empty — native build would fail"; exit 1; }
          test -f sdengine/src/main/cpp/stable-diffusion.cpp/CMakeLists.txt \
            || { echo "::error::stable-diffusion.cpp submodule is empty"; exit 1; }
          echo "all submodule pointers resolve to real content ✓"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        # Puts cmdline-tools (sdkmanager) on PATH — it is installed on ubuntu-latest
        # but not exported by default, which is why a bare `sdkmanager` is not found.
        uses: android-actions/setup-android@v3

      - name: Install pinned NDK + CMake
        # ndkVersion / cmake version are pinned in app/build.gradle.kts; AGP needs
        # those exact versions for the native build.
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" \
                     "ndk;28.2.13676358" "cmake;3.31.6"

      - name: Unit tests — both flavors + modules (gating)
        # Maven Central / the Gradle plugin portal intermittently 403 GitHub runners
        # during dependency resolution (a transient, IP-level block — not a code error).
        # Retry a few times with backoff so a flake doesn't red a sound build.
        run: |
          for attempt in 1 2 3; do
            echo "::group::gradle attempt $attempt"
            if ./gradlew --no-daemon :app:testFullDebugUnitTest :app:testPlayDebugUnitTest; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "attempt $attempt failed; backing off before retry…"
            sleep $((attempt * 20))
          done
          echo "all gradle attempts failed"; exit 1

      - name: Assemble sideload APK — DISABLED (native build OOMs the runner)
        # The native llama.cpp + stable-diffusion.cpp cross-compile is heavy enough to
        # trigger a runner shutdown/cancel mid-build (which defeats continue-on-error and
        # reds the whole job). The native runtime is owner-verified on device anyway, and
        # the unit-test task above already compiles ALL of :app's Kotlin — so a code
        # regression still fails CI. Re-enable on a bigger runner if ever needed.
        if: false
        run: ./gradlew --no-daemon :app:assembleFullDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          if-no-files-found: ignore

  # §7 FIX — weekly native-assemble canary. The full native cross-compile is too heavy
  # for every push (it can OOM the runner — that's why build-test keeps it disabled), so
  # it runs weekly (and on manual dispatch) as a slow canary that actually assembles the
  # sideload APK. This is the scheduled counterpart to the per-push submodule check: it
  # catches a native/build regression that the JVM gate can't, without redding every push.
  native-assemble:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install pinned NDK + CMake
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" \
                     "ndk;28.2.13676358" "cmake;3.31.6"
      - name: Assemble sideload APK (native)
        run: ./gradlew --no-daemon :app:assembleFullDebug
