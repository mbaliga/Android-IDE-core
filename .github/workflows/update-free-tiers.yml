name: Free-tier catalog freshness

# Periodically checks whether the bundled free-tier guide has gone stale and, if so, opens a
# reminder issue. It does NOT auto-write figures — those are verified by hand against each
# provider's source (binding rule 8). The upstream snapshot is attached to the run for diffing.

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: check
        run: python3 scripts/update_free_tiers.py
        continue-on-error: true

      - if: steps.check.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const age = '${{ steps.check.outputs.age }}';
            const title = 'Refresh the cloud free-tier catalog';
            const body = [
              `The bundled free-tier guide (\`app/src/main/assets/free_tiers.json\`) is stale (age: ${age} days).`,
              '',
              'Refresh each figure **against its `sourceUrl`** (do not invent numbers — binding rule 8),',
              'bump `lastUpdated`, and update `_note` if the upstream changed. The run logged an upstream',
              'snapshot from github.com/cheahjs/free-llm-api-resources to diff against.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'free-tiers',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('reminder issue already open');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['free-tiers'],
            });
